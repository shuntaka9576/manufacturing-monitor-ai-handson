name: SETUP validation

on:
  pull_request:
    paths:
      - claude-code/SETUP.md
      - .github/workflows/setup-validation.yml
  push:
    branches: [main, ci/**]
    paths:
      - claude-code/SETUP.md
      - .github/workflows/setup-validation.yml
  workflow_dispatch:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: §1 Python --version (require 3.12+)
        run: python3 --version

      - name: §2 Install uv
        run: |
          curl -LsSf https://astral.sh/uv/0.11.3/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: §2 Verify uv (must be 0.11.3)
        run: |
          uv --version
          test "$(uv --version | awk '{print $2}')" = "0.11.3"

      - name: §3 Install Node.js (macOS, brew)
        if: runner.os == 'macOS'
        run: brew install node || brew upgrade node
      - name: §3 Verify Node.js (macOS)
        if: runner.os == 'macOS'
        run: node --version

      - name: §4 Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: §4 Verify claude
        run: claude --version

      - name: §5 SQLite3 verification
        run: |
          sqlite3 --version
          sqlite3 ":memory:" "CREATE TABLE test(id INTEGER, name TEXT); INSERT INTO test VALUES(1, 'hello'); SELECT * FROM test;"

      - name: §6 Install AWS CLI
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install awscli || brew upgrade awscli
          else
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
          fi
      - name: §6 Verify aws (must be v2.x)
        run: |
          aws --version
          aws --version 2>&1 | grep -E "^aws-cli/2\."

      - name: §7 Install spec-kit
        run: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git@v0.8.0
      - name: §7 Verify specify (must be v0.8.0)
        run: |
          specify --version
          specify --version | grep -q "0\.8\.0"

      - name: §8 Install pnpm
        run: |
          curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=10.33.2 sh -
          if [ "$RUNNER_OS" = "macOS" ]; then
            PNPM_HOME="$HOME/Library/pnpm"
          else
            PNPM_HOME="$HOME/.local/share/pnpm"
          fi
          echo "PNPM_HOME=$PNPM_HOME" >> "$GITHUB_ENV"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"
      - name: §8 Verify pnpm (must be 10.33.2)
        run: |
          pnpm --version
          test "$(pnpm --version)" = "10.33.2"

      - name: §9 Install playwright-cli
        run: pnpm add -g "@playwright/cli@0.1.1" playwright
      - name: §9 Verify @playwright/cli (must be 0.1.1)
        run: |
          pnpm list -g --depth 0
          pnpm list -g --depth 0 2>&1 | grep -F "@playwright/cli@0.1.1"

      - name: §10 Install gh CLI (macOS, brew)
        if: runner.os == 'macOS'
        run: brew install gh || brew upgrade gh
      - name: §10 Verify gh (macOS)
        if: runner.os == 'macOS'
        run: gh --version

  windows:
    name: windows-${{ matrix.shell }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [cmd, pwsh]
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v4

      - name: Pre-add common install dirs to GITHUB_PATH/ENV
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.local\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:LOCALAPPDATA\pnpm"
          Add-Content -Path $env:GITHUB_ENV -Value "PNPM_HOME=$env:LOCALAPPDATA\pnpm"

      - name: §1 Python --version
        run: python --version

      - name: §2 Install uv
        run: powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/0.11.3/install.ps1 | iex"
      - name: §2 Verify uv (must be 0.11.3)
        shell: pwsh
        run: |
          uv --version
          $ver = (uv --version).Trim().Split(' ')[1]
          if ($ver -ne "0.11.3") { throw "uv version mismatch: $ver" }

      - name: §3 Verify Node.js (pre-installed on runner)
        run: node --version

      - name: §4 Install Claude Code
        run: powershell -Command "irm https://claude.ai/install.ps1 | iex"
      - name: §4 Verify claude
        run: claude --version

      - name: §5 SQLite3 --version (pre-installed on runner)
        continue-on-error: true
        run: sqlite3 --version

      - name: §6 Verify aws (must be v2.x; pre-installed on runner)
        shell: pwsh
        run: |
          aws --version
          if (-not ((aws --version 2>&1 | Out-String) -match "aws-cli/2\.")) { throw "aws-cli not v2" }

      - name: §7 Install spec-kit
        run: uv tool install specify-cli --from git+https://github.com/github/spec-kit.git@v0.8.0
      - name: §7 Verify specify (must be v0.8.0)
        shell: pwsh
        run: |
          specify --version
          if (-not ((specify --version) -match "0\.8\.0")) { throw "specify version mismatch" }

      - name: §8 Install pnpm
        shell: pwsh
        run: |
          $env:PNPM_VERSION = '10.33.2'
          Invoke-WebRequest https://get.pnpm.io/install.ps1 -UseBasicParsing | Invoke-Expression
      - name: §8 Verify pnpm (must be 10.33.2)
        shell: pwsh
        run: |
          pnpm --version
          if ((pnpm --version).Trim() -ne "10.33.2") { throw "pnpm version mismatch" }

      - name: §9 Install playwright-cli
        run: pnpm add -g "@playwright/cli@0.1.1" playwright
      - name: §9 Verify @playwright/cli (must be 0.1.1)
        shell: pwsh
        run: |
          pnpm list -g --depth 0
          $out = pnpm list -g --depth 0 2>&1 | Out-String
          if ($out -notmatch "@playwright/cli@0\.1\.1") { throw "@playwright/cli version mismatch" }

      - name: §10 Verify gh (pre-installed on runner)
        run: gh --version
